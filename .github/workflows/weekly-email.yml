name: Weekly email

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Weekly AWS IoT Sensors update
          to: ${{ secrets.WEEKLY_EMAIL_TO }}
          from: ${{ secrets.WEEKLY_EMAIL_FROM }}
          body: |
            This is your scheduled weekly update from the AWS IoT Sensors repository.
